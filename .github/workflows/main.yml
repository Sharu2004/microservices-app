name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            set -e
            echo "Entering app directory..."
            cd /home/ubuntu/app
            echo "Current commit before update:"
            git log --oneline -1

            echo "Fetching latest code..."
            git fetch origin

            echo "Resetting to latest main..."
            git reset --hard origin/main

            echo "Commit after update:"
            git log --oneline -1

            echo "Rebuilding containers..."
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d
